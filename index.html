<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | STACKLY Bank</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-bg-blob blob-1"></div>
        <div class="auth-bg-blob blob-2"></div>

        <div class="auth-card glass-panel">
            <div class="auth-logo">
                <h1>STACK<span>LY</span></h1>
            </div>

            <div class="auth-header">
                <h2>Secure Banking Terminal</h2>
                <p>Welcome back. Please authorize with your credentials.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUserId">User ID / Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" />
                        </svg>
                        <input type="text" id="loginUserId" class="form-input" placeholder="Enter your User ID" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Security Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v-2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginRole">Authorize As (Login As)</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                        </svg>
                        <select id="loginRole" class="form-input" required>
                            <option value="Customer" selected>Customer</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember credentials</span>
                    </label>
                    <a href="404.html" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
                    Access Account
                </button>
            </form>

            <div class="auth-footer">
                New customer? <a href="signup.html">Create Bank Profile</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check remembered credentials
            const remembered = localStorage.getItem('remembered_banking_user');
            if (remembered) {
                const data = JSON.parse(remembered);
                document.getElementById('loginUserId').value = data.userId || '';
                document.getElementById('loginRole').value = data.role || 'Customer';
                document.getElementById('rememberMe').checked = true;
            }

            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const userId = document.getElementById('loginUserId').value.trim();
                const password = document.getElementById('loginPassword').value;
                const role = document.getElementById('loginRole').value;
                const rememberMe = document.getElementById('rememberMe').checked;

                handleLogin(userId, password, role, rememberMe);
            });
        });
    </script>
</body>
</html>
