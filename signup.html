<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | STACKLY Bank</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-bg-blob blob-1"></div>
        <div class="auth-bg-blob blob-2"></div>

        <div class="auth-card glass-panel">
            <div class="auth-logo">
                <h1>STACK<span>LY</span></h1>
            </div>

            <div class="auth-header">
                <h2>Open Your Vault</h2>
                <p>Register a new digital bank access credential.</p>
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="username">Full Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <input type="text" id="username" class="form-input" placeholder="e.g. John Doe" required autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="userId">User ID / Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <input type="email" id="userId" class="form-input" placeholder="e.g. john@email.com" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Security Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <input type="password" id="password" class="form-input" placeholder="Create a strong password" required autocomplete="new-password">
                    </div>
                </div>

                <div class="form-group">
                    <label for="acType">Account Authorization Level</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                        <select id="acType" class="form-input" required>
                            <option value="Customer" selected>Customer (Standard Vault Access)</option>
                            <option value="Admin">Admin (System Overrides & Staff Portal)</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>
                    Register Account
                </button>
            </form>

            <div class="auth-footer">
                Already registered? <a href="index.html">Log In Here</a>
            </div>
        </div>
    </div>

    <!-- Success Checkmark Overlay Modal -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-animation-card">
            <div class="success-checkmark-circle">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" style="width:40px;height:40px;"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h3>Registration Complete</h3>
            <p>Your secure banking profile has been initialized. Redirecting you to login...</p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const userId = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value;
            const acType = document.getElementById('acType').value;
            
            handleSignup(username, userId, password, acType);
        });
    </script>
</body>
</html>
